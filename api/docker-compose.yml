version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: map-hms-pg
    environment:
      POSTGRES_USER: map
      POSTGRES_PASSWORD: map
      POSTGRES_DB: map_hms_test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U map"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:










