server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    index index.php index.html;

    charset utf-8;

    # Allow file uploads (e.g. Livewire /livewire/upload-file, tenant onboarding logo)
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # HSTS - Enforce HTTPS for 1 year, include subdomains, allow preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy - Restrict resource loading
    # Adjust script-src and style-src as needed for Filament/Livewire
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; frame-ancestors 'self';" always;
    
    # Permissions Policy - Disable unnecessary browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CORS headers and pass API requests to Laravel (fixes 404 for /api/v1/tenants etc.)
    location ~ ^/api/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Don't include port in redirects
    port_in_redirect off;

    # Redirect admin domain root to /admin/login
    location = / {
        if ($host = admin.mapservices.in) {
            return 302 /admin/login;
        }
        if ($host ~* admin\.localhost) {
            return 302 /admin/login;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Frontend assets
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM - pass through 500 response body from Laravel (do not replace with nginx error page)
    location ~ \.php$ {
        client_max_body_size 20M;
        fastcgi_intercept_errors off;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # All production traffic arrives via Cloudflare (TLS-terminated) → Traefik → Nginx.
        # Traefik overwrites X-Forwarded-Proto to "http", breaking secure session cookies.
        # Tell PHP the real scheme is HTTPS so sessions and cookies work correctly.
        fastcgi_param HTTPS on;

        fastcgi_read_timeout 600;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Health check endpoint (no auth required)
    location /api/health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block access to Laravel config files
    location ~ \.(env|log|sql)$ {
        deny all;
    }
}

