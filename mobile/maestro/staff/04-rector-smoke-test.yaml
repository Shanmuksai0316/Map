appId: com.mapmars.hmsstaff
name: "Rector Role Smoke Test"
tags:
  - rector
  - smoke
  - staff
  - role-test

---

# ============================================
# Rector Role - Test Credentials
# Phone: 9663275871 | OTP: 123456
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    clearState: true
    clearKeychain: true

- runFlow:
    when:
      visible: "(Get Started|Get Started →)"
    commands:
      - takeScreenshot: "rector/00_splash_screen"
      - tapOn: "(Get Started|Get Started →)"
      - waitForAnimationToEnd
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible: "(Staff App|MAP|Phone Number|Enter Your Number|Get OTP|Login)"
    timeout: 30000

- takeScreenshot: "rector/01_app_launched"

# Enter phone number
- tapOn:
    text: "(Phone Number|Enter your registered phone|Enter Your Number|10-digit)"
    optional: true
- inputText: "9663275871"
- hideKeyboard

- takeScreenshot: "rector/02_phone_entered"

# Tap (Send OTP|Get OTP)
- tapOn: "(Send OTP|Get OTP)"

# Handle OTP sent success dialog
- runFlow:
    when:
      visible: "(Success|OTP sent successfully)"
    commands:
      - tapOn: "OK"

# Retry Get OTP if still on login screen
- runFlow:
    when:
      visible: "(Send OTP|Get OTP)"
    commands:
      - tapOn:
          text: "(Send OTP|Get OTP)"
          optional: true
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "(Success|OTP sent successfully)"
          commands:
            - tapOn: "OK"

# Wait for OTP screen
- extendedWaitUntil:
    visible: "(Verification Code|Enter OTP|Verify|OTP|6-digit|Enter 6-digit)"
    timeout: 15000

- takeScreenshot: "rector/03_otp_screen"

# Enter OTP
- inputText: "123456"
- hideKeyboard

# Tap Verify
- tapOn:
    text: "(Verify & Login|Verify|Submit|Login|Continue)"
    optional: true

# Handle unexpected relaunch back to splash
- runFlow:
    when:
      visible: "(Get Started|Get Started →)"
    commands:
      - tapOn: "(Get Started|Get Started →)"
      - waitForAnimationToEnd
      - waitForAnimationToEnd

# Wait for Rector Dashboard
- extendedWaitUntil:
    visible: "(Good Morning|Good Afternoon|Good Evening|Rector|Outpass|Leave|Insights)"
    timeout: 20000

- takeScreenshot: "rector/04_dashboard"

# ============================================
# Verify Rector-specific UI Elements
# ============================================

# Check for Rector dashboard tiles
- assertVisible:
    text: "(Outpass|Leave|Insights|Notice Board)"

- takeScreenshot: "rector/05_dashboard_verified"

# Test navigation to Outpass
- runFlow:
    when:
      visible: "Outpass"
    commands:
      - tapOn: "Outpass"
      - extendedWaitUntil:
          visible: "(Outpass|Pending|Approved|No outpass)"
          timeout: 10000
      - takeScreenshot: "rector/06_outpass_screen"
      - back

# Test navigation to Insights
- runFlow:
    when:
      visible: "Insights"
    commands:
      - tapOn: "Insights"
      - extendedWaitUntil:
          visible: "(Insights|Analytics|Statistics|Charts)"
          timeout: 10000
      - takeScreenshot: "rector/07_insights_screen"
      - back

- takeScreenshot: "rector/08_test_complete"
