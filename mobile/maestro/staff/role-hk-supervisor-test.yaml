appId: com.mapmars.hmsstaff
name: "HK Supervisor - E2E Test"
tags:
  - hk_supervisor
  - e2e
  - role-specific

---

# ============================================
# HK Supervisor Role E2E Test
# Phone: 9900000007 | OTP: 123456
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible: "(Staff App|Phone Number|Login)"
    timeout: 30000

- takeScreenshot: "hk_supervisor/01_login"

# Enter phone number
- tapOn:
    text: "(Phone Number|Enter your registered)"
    optional: true
- inputText: "8888888885"
- hideKeyboard

- takeScreenshot: "hk_supervisor/02_phone_entered"

# Tap (Send OTP|Get OTP)
- tapOn: "(Send OTP|Get OTP)"

# Handle "Test Mode" dialog
- runFlow:
    when:
      visible: "Test Mode"
    commands:
      - tapOn: "OK"

# Wait for OTP screen
- extendedWaitUntil:
    visible: "(Verification Code|Enter OTP|6-digit)"
    timeout: 15000

- takeScreenshot: "hk_supervisor/03_otp_screen"

# Enter OTP
- inputText: "123456"
- hideKeyboard

# Tap Verify
- tapOn:
    text: "(Verify & Login|Verify)"
    optional: true

# Handle "Select Institution" screen
- runFlow:
    when:
      visible: "(Select Institution|Select Tenant)"
    commands:
      - takeScreenshot: "hk_supervisor/04_tenant_selection"
      - tapOn:
          text: "(Demo College|Demo|College)"
          optional: true

# Wait for Dashboard
- extendedWaitUntil:
    visible: "(HK Supervisor|Housekeeping|Good Morning|Good Afternoon|Good Evening|Dashboard)"
    timeout: 30000

- takeScreenshot: "hk_supervisor/05_dashboard"

# Verify HK Supervisor-specific features
- assertVisible: "(HK Supervisor|Housekeeping|Inspections|Checklists)"
- takeScreenshot: "hk_supervisor/06_dashboard_verified"

# Navigate to Profile
- runFlow:
    when:
      visible: "Profile"
    commands:
      - tapOn: "Profile"
      - extendedWaitUntil:
          visible: "(Profile|Logout|HK Supervisor)"
          timeout: 10000
      - takeScreenshot: "hk_supervisor/07_profile"

- takeScreenshot: "hk_supervisor/08_test_complete"

