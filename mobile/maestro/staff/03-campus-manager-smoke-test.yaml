appId: com.mapmars.hmsstaff
name: "Campus Manager Role Smoke Test"
tags:
  - campus-manager
  - smoke
  - staff
  - role-test

---

# ============================================
# Campus Manager Role - Test Credentials
# Phone: 7975452363 | OTP: 123456
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    clearState: true
    clearKeychain: true

- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Handle "Get Started" splash screen if it appears
- runFlow:
    when:
      visible: "(Get Started|Get Started →)"
    commands:
      - tapOn: "(Get Started|Get Started →)"
      - waitForAnimationToEnd
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible: "(Enter Your Number|Get OTP|(Send OTP|Get OTP)|Phone Number|Login|10-digit)"
    timeout: 30000

- takeScreenshot: "campus-manager/01_app_launched"

# Enter phone number
- tapOn:
    text: "(Phone Number|Enter your registered phone|Enter Your Number|10-digit)"
    optional: true
- inputText: "7975452363"
- hideKeyboard

- takeScreenshot: "campus-manager/02_phone_entered"

# Tap (Send OTP|Get OTP)
- tapOn: "(Send OTP|Get OTP)"

# Handle OTP sent success dialog
- runFlow:
    when:
      visible: "(Success|OTP sent successfully)"
    commands:
      - tapOn: "OK"

# Handle Test Mode dialog if it appears
- runFlow:
    when:
      visible: "Test Mode"
    commands:
      - tapOn: "OK"

# Retry Get OTP if still on login screen
- runFlow:
    when:
      visible: "(Send OTP|Get OTP)"
    commands:
      - tapOn:
          text: "(Send OTP|Get OTP)"
          optional: true
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "(Success|OTP sent successfully)"
          commands:
            - tapOn: "OK"
      - runFlow:
          when:
            visible: "Test Mode"
          commands:
            - tapOn: "OK"

# Wait for OTP screen
- extendedWaitUntil:
    visible: "(Verification Code|Enter OTP|Verify|6-digit)"
    timeout: 15000

- takeScreenshot: "campus-manager/03_otp_screen"

# Enter OTP
- inputText: "123456"
- hideKeyboard

# Tap Verify if button is present (some flows auto-verify)
- runFlow:
    when:
      visible: "(Verify & Login|Verify OTP|Verify|Submit|Login|Continue)"
    commands:
      - tapOn: "(Verify & Login|Verify OTP|Verify|Submit|Login|Continue)"

# Handle unexpected relaunch back to splash
- runFlow:
    when:
      visible: "(Get Started|Get Started →)"
    commands:
      - tapOn: "(Get Started|Get Started →)"
      - waitForAnimationToEnd
      - waitForAnimationToEnd

# Wait for Campus Manager Dashboard
- extendedWaitUntil:
    visible: "(Good Morning|Good Afternoon|Good Evening|Campus Manager|Checklists|Requests|My Staff)"
    timeout: 30000

- takeScreenshot: "campus-manager/04_dashboard"

# ============================================
# Verify Campus Manager-specific UI Elements
# ============================================

# Check for Campus Manager dashboard tiles
- assertVisible:
    text: "(Checklists|Requests|My Staff|Notices|Reports)"

- takeScreenshot: "campus-manager/05_dashboard_verified"

# Test navigation to Requests
- runFlow:
    when:
      visible: "Requests"
    commands:
      - tapOn: "Requests"
      - extendedWaitUntil:
          visible: "(Requests|Pending|All|No requests)"
          timeout: 10000
      - takeScreenshot: "campus-manager/06_requests_screen"
      - back

# Test navigation to My Staff
- runFlow:
    when:
      visible: "My Staff"
    commands:
      - tapOn: "My Staff"
      - extendedWaitUntil:
          visible: "(Staff|Team|No staff)"
          timeout: 10000
      - takeScreenshot: "campus-manager/07_staff_screen"
      - back

- takeScreenshot: "campus-manager/08_test_complete"
