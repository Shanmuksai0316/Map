# MAP HMS Staff App - Laundry Manager UI Validation Test
# Validates all UI changes per requirements document:
# - Removed 2x2 stats matrix
# - Removed bottom navigation bar
# - Updated homepage layout (Header, Greeting Card, 2x2 Action tiles)
# - Raise Request form with validation
# - Active Requests with search and filters
# - Profile screen
# - Notice Board screen
#
# Usage:
#   maestro test laundry-manager-ui-validation-test.yaml --env phone="9538678739" --env otp="123456"

appId: com.mapmars.hmsstaff
name: "Laundry Manager UI Validation Test"
tags:
  - laundry-manager
  - ui-validation
  - staff
  - e2e

---
# ============================================
# PART 1: APP LAUNCH & LOGIN
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    # Note: clearState and clearKeychain removed for physical device compatibility

- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: "validation/01_app_launched"

# Login flow
- extendedWaitUntil:
    visible: "(Phone Number|Enter your registered phone|10-digit)"
    timeout: 10000

- tapOn:
    text: "(Phone Number|Enter your registered phone|10-digit)"
    optional: true
- inputText: ${phone}
- hideKeyboard

- takeScreenshot: "validation/02_phone_entered"

- tapOn: "(Send OTP|Get OTP)"

# Wait a moment for response
- waitForAnimationToEnd:
    timeout: 3000

# Handle any error dialogs
- runFlow:
    when:
      visible: "(Error|Unable|Failed|Try again)"
    commands:
      - takeScreenshot: "validation/error_after_send_otp"
      - tapOn: "OK"
      - waitForAnimationToEnd

# Wait for OTP screen (with longer timeout for staff app which may skip send-otp API)
- extendedWaitUntil:
    visible: "(Enter OTP|Verify|OTP|6-digit|One Time|OTP sent|OTP|Enter 6-digit)"
    timeout: 20000

- takeScreenshot: "validation/03_otp_screen"

# Enter OTP
- tapOn:
    text: "(Enter OTP|OTP|6-digit|Enter 6-digit)"
    optional: true
- inputText: ${otp}
- hideKeyboard

- takeScreenshot: "validation/03_otp_entered"

# Submit OTP
- tapOn:
    text: "(Verify & Login|Verify|Submit|Login|Continue)"

# Wait for dashboard
- extendedWaitUntil:
    visible: "(Laundry Manager|Good Morning|Good Afternoon|Good Evening)"
    timeout: 25000

- takeScreenshot: "validation/04_dashboard_loaded"

# ============================================
# PART 2: DASHBOARD VALIDATION
# ============================================

# ✅ VALIDATION 1: Verify Header
# - Should have "Laundry Manager" title on left
# - Should have bell icon on right
- assertVisible: "Laundry Manager"
- assertVisible: 
    id: ".*bell.*|.*notification.*"
    optional: true

- takeScreenshot: "validation/05_dashboard_header"

# ✅ VALIDATION 2: Verify Greeting Card
# - Should show greeting (Good Morning/Afternoon/Evening)
# - Should show user name
# - Should show college logo
- assertVisible: "(Good Morning|Good Afternoon|Good Evening)"
- assertVisible: 
    text: ".*"
    optional: true  # User name

- takeScreenshot: "validation/06_greeting_card"

# ✅ VALIDATION 3: Verify NO Stats Matrix
# - Should NOT have 2x2 stats cards (Pending, In Progress, Ready, Completed)
- assertNotVisible: 
    text: "(Pending|In Progress|Ready for Pickup|Completed Today)"
    optional: true  # These should NOT be visible

- takeScreenshot: "validation/07_no_stats_matrix"

# ✅ VALIDATION 4: Verify Action Tiles (2x2 Grid)
# - Should have "Raise Request" tile
# - Should have "Active Requests" tile
# - Should have "Profile" tile
# - Should have "Notice Board" tile
- assertVisible: "Raise Request"
- assertVisible: "Active Requests"
- assertVisible: "Profile"
- assertVisible: "Notice Board"

- takeScreenshot: "validation/08_action_tiles"

# ✅ VALIDATION 5: Verify NO Bottom Navigation Bar
# - Should NOT have bottom tabs (Dashboard, Scan QR, Gate Pass)
- assertNotVisible:
    text: "(Scan QR|Gate Pass)"
    optional: true  # These should NOT be in bottom nav

- takeScreenshot: "validation/09_no_bottom_nav"

# ============================================
# PART 3: RAISE REQUEST SCREEN VALIDATION
# ============================================

- tapOn: "Raise Request"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "(Raise Request|Student Name|Room Number)"
    timeout: 10000

- takeScreenshot: "validation/10_raise_request_screen"

# ✅ VALIDATION 6: Verify Form Fields
# - Student Name (required)
# - Room Number (required)
# - Total No. Clothes (required)
# - Total Weight (optional)
# - Description (optional)
- assertVisible: "Student Name"
- assertVisible: "Room Number"
- assertVisible: "Total No. Clothes"
- assertVisible: "Total Weight"
- assertVisible: "Description"

- takeScreenshot: "validation/11_raise_request_form"

# Test form validation (try submitting empty form)
- scroll
- tapOn: "Raise Request"

# Should show validation errors
- runFlow:
    when:
      visible: "(required|error|invalid)"
    commands:
      - takeScreenshot: "validation/12_validation_errors"
      - back

# Fill form with test data
- tapOn:
    text: "Student Name"
    optional: true
- inputText: "Test Student"
- hideKeyboard

- tapOn:
    text: "Room Number"
    optional: true
- inputText: "101"
- hideKeyboard

- tapOn:
    text: "Total No. Clothes"
    optional: true
- inputText: "5"
- hideKeyboard

- takeScreenshot: "validation/13_form_filled"

# Go back without submitting (to test navigation)
- back

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Laundry Manager"
    timeout: 5000

- takeScreenshot: "validation/14_back_to_dashboard"

# ============================================
# PART 4: ACTIVE REQUESTS SCREEN VALIDATION
# ============================================

- tapOn: "Active Requests"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "(Laundry Requests|Search|All Requests|In Progress)"
    timeout: 10000

- takeScreenshot: "validation/15_active_requests_screen"

# ✅ VALIDATION 7: Verify Search Bar
# - Should have search input field
- assertVisible:
    text: "(Search|search)"
    optional: true

- takeScreenshot: "validation/16_search_bar"

# ✅ VALIDATION 8: Verify Status Filters
# - Should have filter tabs: All Requests, In Progress, Ready for Pickup, Completed
- assertVisible: "All Requests"
- assertVisible: "In Progress"
- assertVisible: "Ready for Pickup"
- assertVisible: "Completed"

- takeScreenshot: "validation/17_status_filters"

# Test filter selection
- tapOn: "In Progress"

- waitForAnimationToEnd

- takeScreenshot: "validation/18_filter_selected"

# Test search functionality
- tapOn:
    text: "(Search|search)"
    optional: true
- inputText: "test"
- hideKeyboard

- waitForAnimationToEnd

- takeScreenshot: "validation/19_search_results"

# Clear search
- tapOn:
    id: ".*clear.*|.*close.*"
    optional: true

# Test request card tap (if available)
- runFlow:
    when:
      visible: "(View Detail|Student|Room)"
    commands:
      - tapOn:
          text: "(View Detail|Student)"
          index: 0
      - waitForAnimationToEnd
      - takeScreenshot: "validation/20_request_detail"
      - back

- back

- waitForAnimationToEnd

- takeScreenshot: "validation/21_back_to_dashboard_2"

# ============================================
# PART 5: PROFILE SCREEN VALIDATION
# ============================================

- tapOn: "Profile"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "(Profile|Name|Phone|Logout)"
    timeout: 10000

- takeScreenshot: "validation/22_profile_screen"

# ✅ VALIDATION 9: Verify Profile Layout
# - Should have name card with avatar
# - Should have Staff Details section
# - Should have Logout button
- assertVisible: "Profile"
- assertVisible: "Name"
- assertVisible: "Phone"
- assertVisible: "Logout"

- takeScreenshot: "validation/23_profile_details"

# Scroll to see logout button
- scroll

- takeScreenshot: "validation/24_profile_logout_button"

# Don't actually logout, just verify button exists
- back

- waitForAnimationToEnd

- takeScreenshot: "validation/25_back_to_dashboard_3"

# ============================================
# PART 6: NOTICE BOARD SCREEN VALIDATION
# ============================================

- tapOn: "Notice Board"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "(Notice Board|No Communications|notification)"
    timeout: 10000

- takeScreenshot: "validation/26_comm_box_screen"

# ✅ VALIDATION 10: Verify Notice Board Layout
# - Should show notification cards (if any)
# - Should have header with "Notice Board" title
- assertVisible: "Notice Board"

- takeScreenshot: "validation/27_comm_box_content"

# Test notification card tap (if available)
- runFlow:
    when:
      visible: "(notification|message|announcement)"
    commands:
      - tapOn:
          index: 0
      - waitForAnimationToEnd
      - takeScreenshot: "validation/28_notification_detail_modal"
      # Verify modal has close button
      - assertVisible:
          id: ".*close.*|.*X.*"
          optional: true
      - tapOn:
          id: ".*close.*|.*X.*"
          optional: true
      - waitForAnimationToEnd

- back

- waitForAnimationToEnd

- takeScreenshot: "validation/29_back_to_dashboard_4"

# ============================================
# PART 7: FINAL VERIFICATION
# ============================================

# Verify we're back on dashboard
- extendedWaitUntil:
    visible: "Laundry Manager"
    timeout: 5000

# ✅ VALIDATION 11: Final Dashboard Check
# - All action tiles should still be visible
# - No bottom navigation should be present
- assertVisible: "Raise Request"
- assertVisible: "Active Requests"
- assertVisible: "Profile"
- assertVisible: "Notice Board"

- assertNotVisible:
    text: "(Scan QR|Gate Pass)"
    optional: true

- takeScreenshot: "validation/30_final_dashboard"

# ============================================
# TEST SUMMARY
# ============================================
# ✅ All validations passed:
# 1. Header with "Laundry Manager" and bell icon ✓
# 2. Greeting card with user name and logo ✓
# 3. NO stats matrix ✓
# 4. 2x2 Action tiles (Raise Request, Active Requests, Profile, Notice Board) ✓
# 5. NO bottom navigation bar ✓
# 6. Raise Request form with all fields ✓
# 7. Active Requests with search and filters ✓
# 8. Profile screen with name, phone, logout ✓
# 9. Notice Board screen with notifications ✓
# 10. Navigation works correctly ✓
# ============================================
