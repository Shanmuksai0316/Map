appId: com.mapmars.hmsstaff
name: "Rector - E2E Test"
tags:
  - rector
  - e2e
  - role-specific

---

# ============================================
# Rector Role E2E Test
# Phone: 9900000003 | OTP: 123456
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible: "(Staff App|Phone Number|Login)"
    timeout: 30000

- takeScreenshot: "rector/01_login"

# Enter phone number
- tapOn:
    text: "(Phone Number|Enter your registered)"
    optional: true
- inputText: "8888888882"
- hideKeyboard

- takeScreenshot: "rector/02_phone_entered"

# Tap (Send OTP|Get OTP)
- tapOn: "(Send OTP|Get OTP)"

# Handle "Test Mode" dialog
- runFlow:
    when:
      visible: "Test Mode"
    commands:
      - tapOn: "OK"

# Wait for OTP screen
- extendedWaitUntil:
    visible: "(Verification Code|Enter OTP|6-digit)"
    timeout: 15000

- takeScreenshot: "rector/03_otp_screen"

# Enter OTP
- inputText: "123456"
- hideKeyboard

# Tap Verify
- tapOn:
    text: "(Verify & Login|Verify)"
    optional: true

# Handle "Select Institution" screen
- runFlow:
    when:
      visible: "(Select Institution|Select Tenant)"
    commands:
      - takeScreenshot: "rector/04_tenant_selection"
      - tapOn:
          text: "(Demo College|Demo|College)"
          optional: true

# Wait for Dashboard
- extendedWaitUntil:
    visible: "(Rector|Good Morning|Good Afternoon|Good Evening|Dashboard)"
    timeout: 30000

- takeScreenshot: "rector/05_dashboard"

# Verify Rector-specific features
- assertVisible: "(Rector|Approvals|Pending)"
- takeScreenshot: "rector/06_dashboard_verified"

# Navigate to Profile
- runFlow:
    when:
      visible: "Profile"
    commands:
      - tapOn: "Profile"
      - extendedWaitUntil:
          visible: "(Profile|Logout|Rector)"
          timeout: 10000
      - takeScreenshot: "rector/07_profile"

- takeScreenshot: "rector/08_test_complete"

