# MAP HMS Staff App - Rector Role Full Test Suite
# Tests Rector functionality per US-REC-01, US-REC-02, US-RECT-001 to US-RECT-004
#
# Prerequisites:
# - Staff app installed (com.mapmars.hmsstaff)
# - Demo token generated for Rector role
#
# Usage:
#   maestro test rector-full-test.yaml --env deepLink="maphms://demo?token=xxx&tenant=STXAV&role=rector"

appId: com.mapmars.hmsstaff
name: "Rector Full Test Suite"
tags:
  - rector
  - approvals
  - insights
  - staff

---

# ============================================
# PART 1: APP LAUNCH & LOGIN
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    clearState: true
    clearKeychain: true

- waitForAnimationToEnd:
    timeout: 2000

- runFlow:
    file: ../flows/role-otp-login.yaml
    env:
      deepLink: "maphms://auth/demo?tenant=STXAV&token=126%7CdXYHrIKdcKUOFZPnaA2tFWsi53eZaftLJmteHeE736c90d9f&role=rector&api=https%253A%252F%252Fstxaviers.mapservices.in%252Fv1&tenantId=49d4892b-99ca-415e-9dc2-926952848ecb&tenantName=St.+Xavier%27s+College+of+Engineering&tenantDomain=stxaviers&userId=26&userName=Dr.+John+Smith&userPhone=%2B919876543210&userEmail=rector%40stxaviers.edu"
      phone: "9663275871"
      otp: "123456"
      dashboardRegex: "(rector|Quick Actions|Outpass|Leave|Guest Entry|Notice Board|Profile)"

- takeScreenshot: "rector/01_launch"

# ============================================
# PART 2: DASHBOARD TESTS (US-RECT-001)
# ============================================

- extendedWaitUntil:
    visible: "(rector|Quick Actions|Outpass|Leave|Guest Entry|Notice Board|Profile)"
    timeout: 15000

- takeScreenshot: "rector/02_dashboard"

# Verify Rector dashboard components
- assertVisible: "(Outpass|Leave|Guest Entry|Notice Board|Profile)"

# Verify consolidated approval dashboard elements (US-RECT-001)
- assertVisible: "(Outpass|Leave|Guest Entry|Notice Board)"

- takeScreenshot: "rector/03_dashboard_verified"

# ============================================
# PART 3: APPROVALS INBOX (US-REC-01, US-RECT-001)
# ============================================

# Navigate to Outpass/Leave area if available
- runFlow:
    when:
      visible: "(Outpass|Leave)"
    commands:
      - tapOn:
          text: "(Outpass|Leave)"
      - waitForAnimationToEnd
      - takeScreenshot: "rector/04_approvals_inbox"
      - assertVisible: "(Outpass|Leave|Pending|No approvals|Apply|Request)"
      - back

# Test filter functionality
- runFlow:
    when:
      visible: "(Filter|All|Pending)"
    commands:
      - tapOn:
          text: "(Filter|Pending)"
      - waitForAnimationToEnd
      - takeScreenshot: "rector/05_approvals_filtered"

# Test approval detail if available
- runFlow:
    when:
      visible: "View Details"
    commands:
      - tapOn:
          text: "View Details"
          index: 0
      - waitForAnimationToEnd
      - takeScreenshot: "rector/06_approval_detail"
      # Verify approval action buttons (US-REC-01)
      - assertVisible: "(Approve|Reject|Step-up|OTP|Status|Request)"
      # Verify SLA countdown (US-RECT-001)
      - assertVisible: "(SLA|Expires|Time|hours|Status)"
      - back

# ============================================
# PART 4: SLA NOTIFICATIONS TEST (US-RECT-002)
# ============================================

# Check for SLA indicators on pending items
- runFlow:
    when:
      visible: "(Expiring|Urgent|SLA)"
    commands:
      - takeScreenshot: "rector/07_sla_indicators"

# ============================================
# PART 5: APPROVAL HISTORY (US-RECT-003)
# ============================================

# Look for History tab
- runFlow:
    when:
      visible: "(History|Past|Completed)"
    commands:
      - tapOn:
          text: "(History|Past|Completed)"
      - waitForAnimationToEnd
      - takeScreenshot: "rector/08_approval_history"
      # Verify history filters (US-RECT-003)
      - assertVisible: "(Approved|Rejected|Filter|Date)"

# ============================================
# PART 6: INSIGHTS TAB (US-REC-02)
# ============================================

# Navigate to Insights tab (if available)
- runFlow:
    when:
      visible: "Insights"
    commands:
      - tapOn: "Insights"
      - waitForAnimationToEnd
      - takeScreenshot: "rector/09_insights"
      - assertVisible: "(Insights|Statistics|Reports|Overview)"

# Test PII reveal with audit (US-REC-02)
- runFlow:
    when:
      visible: "(Tap to reveal|\\*\\*\\*\\*|Show)"
    commands:
      - tapOn:
          text: "(Tap to reveal|Show)"
      - waitForAnimationToEnd
      - takeScreenshot: "rector/10_pii_revealed"

# ============================================
# PART 7: MONTHLY REPORTS (US-RECT-004)
# ============================================

# Look for Reports/Download option
- runFlow:
    when:
      visible: "(Reports|Download|Export)"
    commands:
      - tapOn:
          text: "(Reports|Download|Export)"
      - waitForAnimationToEnd
      - takeScreenshot: "rector/11_reports"
      # Verify report options (US-RECT-004)
      - assertVisible: "(Month|Year|PDF|CSV|Download)"
      - back

# ============================================
# PART 8: FINAL VERIFICATION
# ============================================

- runFlow:
    when:
      visible: "Dashboard"
    commands:
      - tapOn: "Dashboard"

- waitForAnimationToEnd

- takeScreenshot: "rector/12_final_dashboard"

# Verify still logged in as Rector
- assertVisible: "(Outpass|Leave|Guest Entry|Notice Board|Profile)"
