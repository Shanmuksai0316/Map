appId: com.mapmars.hmsstaff
name: "Staff App - Universal E2E Test"
tags:
  - staff
  - e2e
  - universal
  - all-roles

---

# ============================================
# Universal Staff App Test
# Uses test credentials: 8888888888 / OTP: 123456
# Tests login flow and dashboard verification
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible: "(Staff App|MAP|Phone Number|Login)"
    timeout: 30000

- takeScreenshot: "universal/01_app_launched"

# Enter phone number (using test credentials from app)
- tapOn:
    text: "(Phone Number|Enter your registered phone|10-digit)"
    optional: true
- inputText: "8888888888"
- hideKeyboard

- takeScreenshot: "universal/02_phone_entered"

# Tap (Send OTP|Get OTP)
- tapOn: "(Send OTP|Get OTP)"

# Handle Test Mode dialog if it appears
- runFlow:
    when:
      visible: "Test Mode"
    commands:
      - takeScreenshot: "universal/03_test_mode_dialog"
      - tapOn: "OK"

# Wait for OTP screen
- extendedWaitUntil:
    visible: "(Verification Code|Enter OTP|Verify|6-digit)"
    timeout: 15000

- takeScreenshot: "universal/04_otp_screen"

# Enter OTP
- inputText: "123456"
- hideKeyboard

# Tap Verify
- tapOn:
    text: "(Verify & Login|Verify|Submit|Login)"
    optional: true

# Handle Tenant/Institution Selection if it appears
- runFlow:
    when:
      visible: "(Select Institution|Select Tenant|Choose your)"
    commands:
      - takeScreenshot: "universal/05_tenant_selection"
      - tapOn: "Demo College Hostel"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000

# Wait for ANY Dashboard to load
- extendedWaitUntil:
    visible: "(Good Morning|Good Afternoon|Good Evening|Campus Manager|Warden|Guard|Rector|Quick Actions)"
    timeout: 30000

- takeScreenshot: "universal/06_dashboard"

# ============================================
# Dashboard Verification
# ============================================

# Verify Quick Actions exist
- assertVisible:
    text: "(Quick Actions|Actions|Menu)"

- takeScreenshot: "universal/07_dashboard_verified"

# Verify key dashboard elements
- assertVisible:
    text: "(Active Hostels|Residents|Requests|Completed|Today)"

- takeScreenshot: "universal/08_stats_verified"

# Scroll to see more content
- scroll

- takeScreenshot: "universal/09_scrolled"

# ============================================
# Test Navigation to a Feature Screen
# ============================================

# Navigate to Profile
- runFlow:
    when:
      visible: "Profile"
    commands:
      - tapOn: "Profile"
      - extendedWaitUntil:
          visible: "(Profile|Logout|Settings|Account|Campus Manager|Name)"
          timeout: 10000
      - takeScreenshot: "universal/10_profile"

# Final screenshot
- takeScreenshot: "universal/11_test_complete"

# ============================================
# Test Complete
# ============================================
- assertVisible:
    text: "(Profile|Logout|Campus Manager|Settings)"
