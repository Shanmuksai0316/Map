appId: com.mapmars.hmsstaff
name: "Campus Manager - E2E Test"
tags:
  - campus_manager
  - e2e
  - role-specific

---

# ============================================
# Campus Manager Role E2E Test
# Phone: 8888888888 | OTP: 123456
# ============================================

- launchApp:
    appId: com.mapmars.hmsstaff
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible: "(Staff App|Phone Number|Login)"
    timeout: 30000

- takeScreenshot: "campus_manager/01_login"

# Enter phone number
- tapOn:
    text: "(Phone Number|Enter your registered)"
    optional: true
- inputText: "8888888888"
- hideKeyboard

- takeScreenshot: "campus_manager/02_phone_entered"

# Tap (Send OTP|Get OTP)
- tapOn: "(Send OTP|Get OTP)"

# Handle "Test Mode" dialog
- runFlow:
    when:
      visible: "Test Mode"
    commands:
      - tapOn: "OK"

# Wait for OTP screen
- extendedWaitUntil:
    visible: "(Verification Code|Enter OTP|6-digit)"
    timeout: 15000

- takeScreenshot: "campus_manager/03_otp_screen"

# Enter OTP
- inputText: "123456"
- hideKeyboard

# Tap Verify
- tapOn:
    text: "(Verify & Login|Verify)"
    optional: true

# Handle "Select Institution" screen
- runFlow:
    when:
      visible: "(Select Institution|Select Tenant)"
    commands:
      - takeScreenshot: "campus_manager/04_tenant_selection"
      - tapOn: "Demo College Hostel"

# Wait for Dashboard
- extendedWaitUntil:
    visible: "(Campus Manager|Good Morning|Good Afternoon|Good Evening|Dashboard)"
    timeout: 30000

- takeScreenshot: "campus_manager/05_dashboard"

# Verify Campus Manager-specific features
- assertVisible: "(Campus Manager|Quick Actions|Active Hostels)"
- takeScreenshot: "campus_manager/06_dashboard_verified"

# Test Quick Actions
- tapOn: "Checklists"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: "campus_manager/07_checklists"

- launchApp:
    appId: com.mapmars.hmsstaff

- extendedWaitUntil:
    visible: "Quick Actions"
    timeout: 15000

- tapOn: "Requests"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: "campus_manager/08_requests"

- launchApp:
    appId: com.mapmars.hmsstaff

- extendedWaitUntil:
    visible: "Quick Actions"
    timeout: 15000

# Navigate to Profile
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "(Profile|Logout|Campus Manager)"
    timeout: 10000
- takeScreenshot: "campus_manager/09_profile"

- takeScreenshot: "campus_manager/10_test_complete"

