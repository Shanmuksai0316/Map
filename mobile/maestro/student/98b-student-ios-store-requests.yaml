appId: com.maphms.student
name: "Student iOS Store Requests"
env:
  phone: "9886179767"
  otp: "123456"
---
- launchApp
- waitForAnimationToEnd
- tapOn:
    point: "50%,89%"
- waitForAnimationToEnd
- waitForAnimationToEnd

- tapOn:
    id: "phone-input"
- eraseText
- inputText: ${phone}
- hideKeyboard
- waitForAnimationToEnd

- tapOn:
    id: "otp-input"
- eraseText
- inputText: ${otp}
- hideKeyboard
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "My Profile"
    timeout: 30000
- waitForAnimationToEnd

- tapOn: "Requests"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn:
    point: "95%,95%"
    optional: true
- waitForAnimationToEnd
- tapOn:
    point: "95%,95%"
    optional: true
- waitForAnimationToEnd
- tapOn:
    point: "95%,90%"
    optional: true
- waitForAnimationToEnd
- tapOn:
    point: "95%,90%"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "student/ios_store/06_requests"
