            - waitForAnimationToEnd
      - pressKey: Back
      - waitForAnimationToEnd

# Step 13: Test Room Change
- runFlow:
    when:
      visible: "(Room.*Change|Change.*Room)"
    commands:
      - tapOn: "(Room.*Change|Change.*Room)"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "(Room.*Change|Create|Request|History)"
          timeout: 10000
      - takeScreenshot: "student/23_room_change_list"
      - runFlow:
          when:
            visible: "(Create|New|Request)"
          commands:
            - tapOn: "(Create|New|Request)"
            - waitForAnimationToEnd
            - takeScreenshot: "student/24_room_change_form"
            - pressKey: Back
            - waitForAnimationToEnd
      - pressKey: Back
      - waitForAnimationToEnd

# Step 14: Test Sports (if available)
- runFlow:
    when:
      visible: "(Sports|Booking|Facility|Court)"
    commands:
      - tapOn: "(Sports|Booking|Facility|Court)"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "(Sports|Booking|Facility|Court|Available)"
          timeout: 10000
      - takeScreenshot: "student/25_sports_screen"
      - scroll
      - takeScreenshot: "student/26_sports_scrolled"
      - runFlow:
          when:
            visible: "(Book|Create|New)"
          commands:
            - tapOn: "(Book|Create|New)"
            - waitForAnimationToEnd
            - takeScreenshot: "student/27_sports_booking_form"
            - pressKey: Back
            - waitForAnimationToEnd
      - pressKey: Back
      - waitForAnimationToEnd

# Step 15: Test Laundry (if available)
- runFlow:
    when:
      visible: "(Laundry|Wash|Service)"
    commands:
      - tapOn: "(Laundry|Wash|Service)"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "(Laundry|Request|Service|History)"
          timeout: 10000
      - takeScreenshot: "student/28_laundry_screen"
      - runFlow:
          when:
            visible: "(Create|New|Request)"
          commands:
            - tapOn: "(Create|New|Request)"
            - waitForAnimationToEnd
            - takeScreenshot: "student/29_laundry_form"
            - pressKey: Back
            - waitForAnimationToEnd
      - pressKey: Back
      - waitForAnimationToEnd

# Step 16: Test Request History
- runFlow:
    when:
      visible: "(Requests|History|All.*Requests)"
    commands:
      - tapOn: "(Requests|History|All.*Requests)"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "(Requests|History|Status|Filter)"
          timeout: 10000
      - takeScreenshot: "student/30_request_history"
      - scroll
      - takeScreenshot: "student/31_request_history_scrolled"
      - pressKey: Back
      - waitForAnimationToEnd

# Step 17: Test Notice Board/Messages
- runFlow:
    when:
      visible: "(Comm.*Box|Communication|Messages|Message)"
    commands:
      - tapOn: "(Comm.*Box|Communication|Messages|Message)"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "(Comm.*Box|Communication|Message|Chat)"
          timeout: 10000
      - takeScreenshot: "student/32_commbox_screen"
      - pressKey: Back
      - waitForAnimationToEnd

# Step 18: Test Emergency
- runFlow:
    when:
      visible: "(Emergency|Help|Contact)"
    commands:
      - tapOn: "(Emergency|Help|Contact)"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "(Emergency|Contact|Help|Call)"
          timeout: 10000
      - takeScreenshot: "student/33_emergency_screen"
      - pressKey: Back
      - waitForAnimationToEnd

# Final: Return to Dashboard and Verify (best-effort)
- runFlow:
    when:
      visible: "(Welcome|Dashboard|Home|Quick.*Actions|KARTA|VIDYARTHI|Profile|Out.*Pass|Leave)"
    commands:
      - takeScreenshot: "student/34_final_dashboard"
      - scroll
      - takeScreenshot: "student/35_final_dashboard_scrolled"

# Test Complete
- assertVisible: "(Welcome|Dashboard|Home|KARTA|VIDYARTHI)"
