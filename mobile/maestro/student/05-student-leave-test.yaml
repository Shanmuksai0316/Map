appId: com.maphms.student
name: "Student Leave Management Test"
tags:
  - student-app
  - leave
env:
  phone: "8888888800"
  otp: "123456"
---
# Student Leave Feature Test
# Tests regular leave and sick leave

# Login first
- runFlow:
    file: "../flows/student-otp-login.yaml"
    env:
      phone: ${phone}
      otp: ${otp}

# Navigate to Leave
- tapOn: "Leave"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "(Leave|Regular Leave)"
    timeout: 10000
- takeScreenshot: "student/leave/01_leave_screen"

# Test create leave request
- runFlow:
    when:
      visible: "(Create|New|Request|Apply)"
    commands:
      - tapOn: "(Create|New|Request|Apply)"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "(From|To|Date|Reason|Emergency Contact)"
          timeout: 10000
      - takeScreenshot: "student/leave/02_leave_form"
      - pressKey: Back
      - waitForAnimationToEnd

# Check leave list/history
- runFlow:
    when:
      visible: "(History|List|Requests|Pending|Approved)"
    commands:
      - takeScreenshot: "student/leave/03_leave_list"
      - runFlow:
          when:
            visible: "(View|Details)"
          commands:
            - tapOn: "(View|Details)"
            - waitForAnimationToEnd
            - takeScreenshot: "student/leave/04_leave_detail"
            - pressKey: Back
            - waitForAnimationToEnd

# Return to dashboard
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "(Welcome|Dashboard)"

