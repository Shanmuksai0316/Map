plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.facebook.react"
    id "com.google.gms.google-services"
}

// ===========================================================================
// MAP Hostel Management System -- Android Build Configuration
// ===========================================================================
//
// Product Flavors (2 dimensions):
//   app         -> student (Vidyarthi) | staff (Kartha)
//   environment -> local              | production
//
// Application IDs:
//   Student app : com.maphms.student
//   Staff app   : com.mapmars.hmsstaff
//
// Build variants are the cross-product of the above, e.g.:
//   studentProductionRelease, staffLocalDebug, etc.
//
// Play Store / App Store Release Checklist:
//   1. Generate a proper release signing keystore and configure it in the
//      `signingConfigs` block below. The current setup uses the debug keystore,
//      which is NOT suitable for production distribution.
//      See: https://reactnative.dev/docs/signed-apk-android
//   2. Place your google-services.json (from Firebase Console) in android/app/.
//      Firebase Analytics and Cloud Messaging are required dependencies.
//   3. The custom font EthnocentricRg.otf (used for branding text "VIDYARTHI"
//      and "KARTHA") must be present in android/app/src/main/assets/fonts/.
//   4. Bump versionCode and versionName before each store upload.
//
// ===========================================================================

// React Native Vector Icons - Fix for Chinese/foreign language icons
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants that are debuggable (load JS from Metro, no bundled assets).
    //   Keep this limited to "local" variants used for development.
    debuggableVariants = [
        "studentLocalDebug",
        "staffLocalDebug"
    ]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion  "27.0.12077973"
    buildToolsVersion "35.0.0"
    // Use classic compileSdkVersion API for maximum plugin compatibility
    compileSdkVersion 35

    namespace "com.mapmars.hms"
    
    // Disable Prefab (Common Skia Crash Fix) - using new DSL
    buildFeatures {
        prefab false
    }

    packaging {
        jniLibs {
            // Required for 16 KB page-size alignment with AGP 8.5.1+
            useLegacyPackaging = false
        }
    }
    
    defaultConfig {
        minSdkVersion 26
        targetSdkVersion 35
        versionCode 8
        versionName "1.0.7"
        
        // ABI filters for Skia compatibility (arm only, no x86)
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }

        // NDK r27 requires flexible page-size support to generate 16 KB aligned ELF segments.
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
        }
    }

    // Disable release lint to avoid third-party library lint crashes when
    // generating production APKs/AABs. This does not affect debug builds.
    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    // Two flavor dimensions: app type (student/staff) and environment (local/production)
    // Workflow: local development → production (no staging)
    flavorDimensions "app", "environment"
    
    productFlavors {
        // =======================================================================
        // APP TYPE FLAVORS
        // =======================================================================
        student {
            dimension "app"
            applicationId "com.maphms.student"
            resValue "string", "app_name", "Vidyarthi"
            buildConfigField "String", "BUILD_VARIANT", '"student"'
        }
        staff {
            dimension "app"
            applicationId "com.mapmars.hmsstaff"
            resValue "string", "app_name", "Kartha"
            buildConfigField "String", "BUILD_VARIANT", '"staff"'
        }
        
        // =======================================================================
        // ENVIRONMENT FLAVORS (local → production workflow)
        // =======================================================================
        local {
            dimension "environment"
            buildConfigField "String", "BUILD_ENV", '"local"'
            // No suffix for local - uses same app ID
        }
        production {
            dimension "environment"
            buildConfigField "String", "BUILD_ENV", '"production"'
            // No suffix for production - uses base app ID
        }
    }
    
    // Customize app names for environment variants
    applicationVariants.all { variant ->
        def appName = variant.productFlavors[0].name == "student" ? "Vidyarthi" : "Kartha"
        def envName = variant.productFlavors[1].name
        
        if (envName == "local") {
            appName = appName + " (Dev)"
        }
        
        variant.resValue "string", "app_name", appName
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file('student-release.jks')
            storePassword System.getenv("STUDENT_KEYSTORE_PASSWORD")
            keyAlias "student"
            keyPassword System.getenv("STUDENT_KEY_PASSWORD")
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Disable app-level CMake native build for release AAB to avoid Prefab/NDK issues.
    // Native libraries from dependencies (VisionCamera, Reanimated, Skia, etc.)
    // are still packaged from their own AARs.
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Firebase (managed via BoM - versions from Firebase Android setup)
    implementation(platform("com.google.firebase:firebase-bom:34.9.0"))
    implementation("com.google.firebase:firebase-analytics")
    implementation("com.google.firebase:firebase-messaging")
}
