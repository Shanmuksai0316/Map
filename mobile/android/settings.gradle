pluginManagement {
    // Include the React Native Gradle plugin builds so both
    // 'com.facebook.react' and 'com.facebook.react.settings'
    // plugins resolve from local node_modules.
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// React Native Gradle plugin settings for autolinking native modules
plugins {
    id 'com.facebook.react.settings'
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'rn082template'
include ':app'
