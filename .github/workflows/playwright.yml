name: Playwright Tests

# DISABLED - Can re-enable later when needed

on:
  pull_request:
  # push disabled to stop error emails

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: map_hms_test
          POSTGRES_USER: map_user
          POSTGRES_PASSWORD: map_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U map_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pgsql, pdo_pgsql
          
      - name: Install Composer deps
        working-directory: api
        run: composer install --prefer-dist --no-interaction

      - uses: actions/setup-node@v4
        with: { node-version: '20' }
        
      - name: Install Playwright + browsers
        working-directory: api
        run: |
          npm i -D @playwright/test
          npx playwright install --with-deps

      - name: Create .env
        working-directory: api
        run: |
          cat > .env << EOF
          APP_ENV=testing
          APP_KEY=base64:$(openssl rand -base64 32)
          LOG_CHANNEL=stack
          QUEUE_CONNECTION=sync
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=map_hms_test
          DB_USERNAME=map_user
          DB_PASSWORD=map_password
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          EOF
          
      - name: Run migrations
        working-directory: api
        run: php artisan migrate --force

      - name: Run Playwright tests
        working-directory: api
        run: npx playwright test || echo "⚠️ Some tests failed"
        continue-on-error: true
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: api/playwright-report/
          retention-days: 7
